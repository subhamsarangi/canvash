<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="description" content="Free mobile drawing app. Sketch, doodle and paint on an infinite canvas — works right in your browser, no install needed.">
<meta name="keywords" content="drawing app, sketch app, mobile drawing, infinite canvas, free drawing tool, online sketchpad, canvash">

<!-- Open Graph — controls how it looks when shared on WhatsApp, Twitter etc -->
<meta property="og:title" content="Canvash — Free Mobile Drawing App">
<meta property="og:description" content="Sketch and paint on an infinite canvas. Free, no install, works on any phone.">
<meta property="og:url" content="https://canvash.openworldregister.com>">
<meta property="og:type" content="website">
<meta property="og:image" content="https://cdn.openworldregister.com/canvash/preview.png">

<!-- Twitter card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Canvash — Free Mobile Drawing App">
<meta name="twitter:description" content="Sketch and paint on an infinite canvas. Free, no install, works on any phone.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#141418">

<title>Canvash — Free Mobile Drawing & Sketch App</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="25f2cac7-93b9-403b-a113-95476281379a"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Syne+Mono&display=swap" rel="stylesheet">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4027347901063259"
     crossorigin="anonymous"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- VIEWPORT wrapper - zoom/pan transforms applied here -->
<div id="viewport">
  <canvas id="bgCanvas"></canvas>
  <canvas id="canvasEl"></canvas>
</div>

<!-- ZOOM HUD -->
<div id="zoomHud">
  <button class="zoom-hud-btn" id="zoomOut">&#8722;</button>
  <div class="zoom-sep"></div>
  <div id="zoomLabel">100%</div>
  <div class="zoom-sep"></div>
  <button class="zoom-hud-btn" id="zoomReset" style="font-size:11px;letter-spacing:0.04em;width:48px;">FIT</button>
  <div class="zoom-sep"></div>
  <button class="zoom-hud-btn" id="zoomIn">+</button>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Canvash</div>
  <div class="save-indicator">
    <div class="save-dot" id="saveDot"></div>
    <span id="saveLabel">Saved</span>
  </div>
  <button class="top-icon-btn" id="btnProjects" title="Projects">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
  </button>
  <button class="top-icon-btn" id="btnExport" title="Export & Share">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
  </button>
</div>

<!-- FLOAT UNDO/REDO -->
<div class="float-actions">
  <button class="float-btn" id="btnUndo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M3 7v6h6"/><path d="M3 13C5.5 6 12 4 18 7.5"/></svg>
  </button>
  <button class="float-btn" id="btnRedo">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 7v6h-6"/><path d="M21 13C18.5 6 12 4 6 7.5"/></svg>
  </button>
</div>

<!-- BOTTOM TOOLBAR -->
<div class="toolbar">
  <!-- Tool picker -->
  <button class="tb-btn" id="tbTool">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="toolIcon"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="11" cy="11" r="2"/></svg>
    <span id="toolLabel">Brush</span>
  </button>

  <!-- Brush size -->
  <button class="tb-btn" id="tbBrush">
    <div class="tb-brush-preview"><div class="tb-brush-dot" id="brushDotPreview"></div></div>
    <span>Size</span>
  </button>

  <!-- Color -->
  <button class="tb-btn" id="tbColor" style="gap:6px">
    <div class="tb-color-preview" id="colorPreview"></div>
    <span>Color</span>
  </button>

  <!-- Background -->
  <button class="tb-btn" id="tbBg">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
    <span>Canvas</span>
  </button>

  <!-- Pan -->
  <button class="tb-btn" id="tbPan">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9l-3 3 3 3M9 5l3-3 3 3M15 19l-3 3-3-3M19 9l3 3-3 3M2 12h20M12 2v20"/></svg>
    <span>Pan</span>
  </button>

  <!-- Clear -->
  <button class="tb-btn" id="tbClear">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
    <span>Clear</span>
  </button>
</div>

<!-- ── PANELS ── -->

<!-- Overlay -->
<div class="panel-overlay" id="overlay"></div>

<!-- TOOLS PANEL -->
<div class="slide-panel" id="panelTool">
  <div class="panel-handle"></div>
  <div class="panel-title">Drawing Tool</div>
  <div class="panel-scroll">
    <div class="tools-grid" id="toolsGrid">
      <div class="tool-card active" data-tool="brush">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><circle cx="11" cy="11" r="2"/></svg>
        <span>Brush</span>
      </div>
      <div class="tool-card" data-tool="pen">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.85 0 114 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
        <span>Pen</span>
      </div>
      <div class="tool-card" data-tool="marker">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="12" height="6" rx="2"/><path d="M14 12h4l3 3-3 3h-4"/></svg>
        <span>Marker</span>
      </div>
      <div class="tool-card" data-tool="eraser">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16l10-10 7 7-1.5 1.5"/><path d="M6.5 17.5l5-5"/></svg>
        <span>Eraser</span>
      </div>
      <div class="tool-card" data-tool="fill">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11l-8-8-8.5 8.5a5.5 5.5 0 007.78 7.78L19 11z"/><path d="M20 23c0-1.5 2.5-4 2.5-4s2.5 2.5 2.5 4a2.5 2.5 0 01-5 0z"/></svg>
        <span>Fill</span>
      </div>
      <div class="tool-card" data-tool="eyedropper">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 22l1-1h3l9-9"/><path d="M3 21v-3l9-9"/><path d="m15 6 3.4-3.4a2.1 2.1 0 0 1 3 3L18 9l.4.4a2.1 2.1 0 0 1 0 3l-1.2 1.2a2.1 2.1 0 0 1-3 0L9 8.6"/></svg>
        <span>Pick</span>
      </div>
    </div>
  </div>
</div>

<!-- BRUSH PANEL -->
<div class="slide-panel" id="panelBrush">
  <div class="panel-handle"></div>
  <div class="panel-title">Brush Size</div>
  <div class="panel-scroll">
    <div class="panel-section">
      <div class="section-label">Size</div>
      <div class="brush-row" id="brushRow"></div>
    </div>
    <div class="panel-section">
      <div class="section-label">Opacity</div>
      <div class="slider-row">
        <span class="slider-label">Opacity</span>
        <input type="range" id="opacitySlider" min="5" max="100" value="100">
        <span class="slider-val" id="opacityVal">100%</span>
      </div>
    </div>
  </div>
</div>

<!-- COLORS PANEL -->
<div class="slide-panel" id="panelColor">
  <div class="panel-handle"></div>
  <div class="panel-title">Colors</div>
  <div class="panel-scroll">
    <div class="color-grid" id="colorGrid"></div>
  </div>
</div>

<!-- BACKGROUND PANEL -->
<div class="slide-panel" id="panelBg">
  <div class="panel-handle"></div>
  <div class="panel-title">Canvas Background</div>
  <div class="panel-scroll">
    <div class="bg-grid" id="bgGrid"></div>
  </div>
</div>

<!-- PROJECTS PANEL -->
<div class="slide-panel" id="panelProjects">
  <div class="panel-handle"></div>
  <div class="panel-title">Projects</div>
  <div class="panel-scroll">
    <button class="new-proj-btn" id="newProjBtn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Project
    </button>
    <div id="projectsList"></div>
  </div>
</div>

<!-- EXPORT PANEL -->
<div class="slide-panel" id="panelExport">
  <div class="panel-handle"></div>
  <div class="panel-title">Export & Share</div>
  <div class="panel-scroll">
    <button class="action-btn accent" id="aExportJpg">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      Save as JPG
    </button>
    <button class="action-btn" id="aExportPng">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      Save as PNG
    </button>
    <button class="action-btn" id="aCopyImg">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></div>
      Copy to Clipboard
    </button>
    <button class="action-btn" id="aShareNative">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></div>
      Share…
    </button>
    <button class="action-btn" id="aShareTwitter">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      Share to Twitter/X
    </button>
    <button class="action-btn" id="aShareInsta">
      <div class="ab-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg></div>
      Share to Instagram
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="scripts.js"></script>
</body>
</html>
